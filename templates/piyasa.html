<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Canlı Piyasa | Q-AI Terminal</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;800;900&display=swap" rel="stylesheet">
    <style>
        body { font-family: 'Inter', sans-serif; background-color: #030304; color: white; }
        .glass-panel { background: linear-gradient(135deg, #0A0A0E 0%, #050507 100%); border: 1px solid #1A1A24; border-radius: 16px; }
        ::-webkit-scrollbar { width: 6px; }
        ::-webkit-scrollbar-track { background: #050507; }
        ::-webkit-scrollbar-thumb { background: #1A1A24; border-radius: 10px; }
        .coin-row:hover { background-color: rgba(255, 255, 255, 0.03); }
        
        /* Fiyat Güncelleme Efekti */
        .flash-green { animation: flashG 1s ease-out; }
        .flash-red { animation: flashR 1s ease-out; }
        @keyframes flashG { 0% { background-color: rgba(16, 185, 129, 0.4); } 100% { background-color: transparent; } }
        @keyframes flashR { 0% { background-color: rgba(239, 68, 68, 0.4); } 100% { background-color: transparent; } }
    </style>
</head>
<body class="h-screen w-screen p-4 md:p-6 flex flex-col items-center overflow-hidden">

    <div class="w-full max-w-[1200px] h-full flex flex-col">
        <!-- Geri Dönüş ve Başlık -->
        <div class="flex items-center justify-between mb-4 pb-4 border-b border-gray-800 shrink-0">
            <div>
                <a href="/" class="text-gray-400 hover:text-[#00ffcc] transition-colors text-sm font-bold flex items-center gap-2 mb-2">
                    <svg class="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M10 19l-7-7m0 0l7-7m-7 7h18"></path></svg>
                    ANA PANOYA DÖN
                </a>
                <div class="flex items-center gap-3">
                    <h1 class="text-3xl font-black tracking-widest text-white">🔴 CANLI PİYASA</h1>
                </div>
            </div>
            <div class="hidden md:block text-right">
                <p class="text-[#A0A0A5] text-sm">Gerçek Zamanlı Binance Veri Akışı</p>
                <div class="flex items-center justify-end gap-2 mt-1">
                    <div class="w-2 h-2 rounded-full bg-[#00ffcc] animate-pulse"></div>
                    <p class="text-[#00ffcc] text-xs font-bold" id="status-text">Bağlanıyor...</p>
                </div>
            </div>
        </div>

        <!-- Piyasa Tahtası -->
        <div class="glass-panel flex-grow flex flex-col overflow-hidden relative">
            
            <div class="flex justify-between items-center px-6 py-4 bg-[#07070A] border-b border-[#1A1A24] shrink-0 text-[#737373] text-xs font-bold tracking-wider">
                <div class="w-1/4">COIN / USDT</div>
                <div class="w-1/4 text-right cursor-pointer hover:text-[#00ffcc]" onclick="sortTable('fiyat')">FİYAT ↕️</div>
                <div class="w-1/4 text-right cursor-pointer hover:text-[#00ffcc]" onclick="sortTable('degisim')">24S DEĞİŞİM ↕️</div>
                <div class="w-1/4 text-right cursor-pointer hover:text-[#00ffcc]" onclick="sortTable('hacim')">24S HACİM ↕️</div>
            </div>

            <!-- Coin Listesi -->
            <div class="overflow-y-auto flex-grow" id="market-list">
                <!-- JavaScript verileri buraya otomatik çizecek -->
            </div>
        </div>
    </div>

    <!-- OTOMATİK VERİ ÇEKME VE ÇİZME MOTORU -->
    <script>
        let siralama = { aktif: 'hacim', ters: true };
        let oncekiFiyatlar = {}; // Yanıp sönme efekti için eski fiyatları tutarız

        // 1. API'den Verileri Çek
        async function fetchLiveMarket() {
            try {
                const response = await fetch('/api/piyasa');
                const data = await response.json();
                
                document.getElementById('status-text').innerText = "Canlı Akış Aktif";
                renderMarket(data);
            } catch (error) {
                document.getElementById('status-text').innerText = "Bağlantı Hatası!";
                document.getElementById('status-text').className = "text-red-500 text-xs font-bold";
            }
        }

        // 2. Verileri Ekrana Çiz
        function renderMarket(data) {
            const list = document.getElementById('market-list');
            
            // Verileri seçilen kritere göre sırala
            data.sort((a, b) => {
                let valA = a[siralama.aktif];
                let valB = b[siralama.aktif];
                return siralama.ters ? valB - valA : valA - valB;
            });

            // Ekranı temizlemeden (açık sekmeler kapanmasın diye) HTML'i oluştur
            let htmlContent = "";
            data.forEach(coin => {
                
                // Formatlama (Büyük sayılara virgül, küçük sayılara bol sıfır)
                let fiyat = parseFloat(coin.fiyat);
                let formatliFiyat = fiyat < 1 ? fiyat.toFixed(5) : fiyat.toLocaleString('en-US', {minimumFractionDigits: 2, maximumFractionDigits: 2});
                let hacim = parseFloat(coin.hacim).toLocaleString('en-US', {maximumFractionDigits: 0});
                let degisim = parseFloat(coin.degisim);
                
                let renk = degisim >= 0 ? '#10B981' : '#EF4444';
                let isaret = degisim >= 0 ? '+' : '';
                
                // Fiyat değiştiyse yanıp sönme efekti belirle
                let flashClass = "";
                if (oncekiFiyatlar[coin.sembol]) {
                    if (fiyat > oncekiFiyatlar[coin.sembol]) flashClass = "flash-green";
                    else if (fiyat < oncekiFiyatlar[coin.sembol]) flashClass = "flash-red";
                }
                oncekiFiyatlar[coin.sembol] = fiyat; // Yeni fiyatı kaydet

                htmlContent += `
                <div class="coin-group border-b border-[#1A1A24]/50">
                    <div class="coin-row flex justify-between items-center px-6 py-5 cursor-pointer border-l-4 transition-all duration-200 ${flashClass}"
                         style="border-color: ${renk};" onclick="toggleAI('${coin.sembol}')">
                        
                        <div class="w-1/4 flex items-center gap-3">
                            <img src="https://assets.coincap.io/assets/icons/${coin.sembol.toLowerCase()}@2x.png" onerror="this.src='https://assets.coincap.io/assets/icons/btc@2x.png'" class="w-8 h-8 rounded-full bg-gray-800 p-1">
                            <span class="font-black text-xl text-white">${coin.sembol}</span>
                        </div>
                        
                        <div class="w-1/4 text-right font-bold text-lg" style="color: ${renk};">$${formatliFiyat}</div>
                        
                        <div class="w-1/4 flex justify-end">
                            <div class="px-3 py-1 rounded-md font-bold text-sm text-white" style="background-color: ${renk};">
                                ${isaret}${degisim.toFixed(2)}%
                            </div>
                        </div>
                        
                        <div class="w-1/4 text-right text-[#A0A0A5] font-bold text-md">$${hacim}M</div>
                    </div>

                    <!-- Gizli AI Yorum Satırı -->
                    <div id="ai-${coin.sembol}" class="ai-row hidden bg-[#050507] px-6 py-4 border-l-4 border-[#00ffcc] m-2 rounded-lg shadow-inner">
                        <div class="flex items-start gap-3">
                            <span class="text-xl">🤖</span>
                            <div>
                                <h4 class="text-[#00ffcc] font-black text-sm mb-1">Q-AI Analizi</h4>
                                <p class="text-[#A0A0A5] text-sm font-medium">
                                    <span class="text-white font-bold">Yön: ${coin.ai_yon}</span> | ${coin.ai_yorum}
                                </p>
                            </div>
                        </div>
                    </div>
                </div>
                `;
            });

            // Açık olan sekmeleri hafızada tut
            let acikSekmeler = [];
            document.querySelectorAll('.ai-row:not(.hidden)').forEach(el => acikSekmeler.push(el.id));

            list.innerHTML = htmlContent;

            // HTML yenilendikten sonra eski açık sekmeleri geri aç
            acikSekmeler.forEach(id => {
                const el = document.getElementById(id);
                if(el) el.classList.remove('hidden');
            });
        }

        // Tıklayınca AI Yorumunu Aç/Kapat
        window.toggleAI = function(sembol) {
            const aiRow = document.getElementById('ai-' + sembol);
            if (aiRow.classList.contains('hidden')) {
                aiRow.classList.remove('hidden');
            } else {
                aiRow.classList.add('hidden');
            }
        }

        // Sıralama Değiştirici
        window.sortTable = function(olcut) {
            if (siralama.aktif === olcut) {
                siralama.ters = !siralama.ters;
            } else {
                siralama.aktif = olcut;
                siralama.ters = true;
            }
            fetchLiveMarket(); // Sıralama değişince hemen yeni veri çiz
        }

        // HER 3 SANİYEDE BİR ARKA PLANDA SESSİZCE VERİ ÇEK (SAYFA YENİLEMEDEN!)
        setInterval(fetchLiveMarket, 3000);
        
        // Sayfa ilk açıldığında hemen veriyi çek
        fetchLiveMarket();
    </script>
</body>
</html>
